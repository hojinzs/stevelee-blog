type Tag @model @auth(rules: [{allow: public}]) {
  id: ID!
  label: String
  posts: [Post] @manyToMany(relationName: "PostTag")
}

type Post @model @auth(rules: [{allow: public, operations: [read]}, {allow: owner}]) {
  id: ID!
  title: String
  content: String
  published_at: AWSDateTime
  TAGS: [Tag] @manyToMany(relationName: "PostTag")
}
 